<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

    <!-- Primary Meta Tags -->
    <title>Wam Zoo — Wild. Smart. Real.</title>
    <meta name="title" content="Wam Zoo — Wild. Smart. Real.">
    <meta name="description" content="Discover wildlife, learn about habitats, and support conservation efforts. Real animals. Real data. Real conservation.">
    <meta name="theme-color" content="#1B4332">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://wamzoo.com">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://wamzoo.com">
    <meta property="og:title" content="Wam Zoo — Wild. Smart. Real.">
    <meta property="og:description" content="Discover wildlife, learn about habitats, and support conservation efforts. Real animals. Real data. Real conservation.">
    <meta property="og:image" content="<%= BASE_URL %>og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://wamzoo.com">
    <meta property="twitter:title" content="Wam Zoo — Wild. Smart. Real.">
    <meta property="twitter:description" content="Discover wildlife, learn about habitats, and support conservation efforts. Real animals. Real data. Real conservation.">
    <meta property="twitter:image" content="<%= BASE_URL %>og-image.png">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="<%= BASE_URL %>favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="<%= BASE_URL %>favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="<%= BASE_URL %>favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="<%= BASE_URL %>apple-touch-icon.png">
    <link rel="manifest" href="<%= BASE_URL %>site.webmanifest">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:system-ui,sans-serif;background:#F5F0E1;color:#1A1A1A;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column">
        <h1 style="font-size:1.5rem;margin-bottom:0.5rem">Wam Zoo requires JavaScript</h1>
        <p style="max-width:400px;line-height:1.6;color:#6B6B5C">Please enable JavaScript in your browser to explore wildlife, learn about habitats, and discover conservation stories.</p>
      </div>
    </noscript>
    <div id="app"></div>
  </body>
</html>
